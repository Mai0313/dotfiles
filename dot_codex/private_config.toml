#:schema https://developers.openai.com/codex/config-schema.json
# Example: https://developers.openai.com/codex/config-sample

model = "gpt-5.5"
review_model = "gpt-5.5"
personality = "pragmatic"
approval_policy = "never"
model_reasoning_effort = "xhigh"
plan_mode_reasoning_effort = "xhigh"
model_reasoning_summary = "auto"
model_context_window = 1050000
model_auto_compact_token_limit = 735000
model_verbosity = "medium"
model_supports_reasoning_summaries = true
project_doc_fallback_filenames = ["CLAUDE.md", "GEMINI.md"]
web_search = "live"
suppress_unstable_features_warning = true

approvals_reviewer = "auto_review"
sandbox_mode = "danger-full-access"
hide_agent_reasoning = true
show_raw_agent_reasoning = false
disable_paste_burst = false
check_for_update_on_startup = true

notify = ["notify-send", "Codex"]

[model_providers.oai]
name = "oai"
base_url = "https://api.mai0313.com"
env_key = "OPENAI_API_KEY"
wire_api = "responses"
http_headers = { "x-litellm-end-user-id" = "codex" }

[profiles.azure]
model = "azure/gpt-5.5"
model_provider = "oai"
personality = "pragmatic"
approval_policy = "never"
model_reasoning_effort = "xhigh"
plan_mode_reasoning_effort = "xhigh"
model_reasoning_summary = "auto"
model_verbosity = "medium"

[profiles.azure.features]
terminal_resize_reflow = true
memories = true
external_migration = false
goals = true
prevent_idle_sleep = true

[features]
shell_tool = true
codex_git_commit = true
shell_snapshot = true
multi_agent = true
personality = true
enable_request_compression = true
skill_mcp_dependency_install = true
terminal_resize_reflow = true
js_repl = true
memories = true
prevent_idle_sleep = true
goals = true
collaboration_modes = true
mentions_v2 = true

[memories]
generate_memories = true
use_memories = true
disable_on_external_context = true
extract_model = "gpt-5.5"
consolidation_model = "gpt-5.5"

[analytics]
enabled = false

[feedback]
enabled = false

[agents]
# Maximum concurrently open agent threads. Default: 6
max_threads = 10
# Maximum nested spawn depth. Root session starts at depth 0. Default: 1
max_depth = 3
# Default timeout per worker for spawn_agents_on_csv jobs. When unset, the tool defaults to 1800 seconds.
job_max_runtime_seconds = 1800

[tui]
notifications = ["agent-turn-complete", "approval-requested"]
alternate_screen = "auto"
status_line = ["current-dir", "model-with-reasoning", "git-branch", "pull-request-number", "context-used", "used-tokens", "task-progress", "permissions", "run-state"]
status_line_use_colors = true
