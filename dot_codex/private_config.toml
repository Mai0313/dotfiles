#:schema https://developers.openai.com/codex/config-schema.json
model = "gpt-5.4"
model_reasoning_effort = "high"
plan_mode_reasoning_effort = "high"
approval_policy = "untrusted"
model_reasoning_summary = "auto"
hide_agent_reasoning = true
personality = "pragmatic"
approvals_reviewer = "guardian_subagent"

[model_providers.oai]
name = "OpenAI"
base_url = "https://api.mai0313.com"
env_key = "OPENAI_API_KEY"
wire_api = "responses"

# [profiles.default]
# model = "gpt-5.4"
# model_provider = "openai"
# approval_policy = "on-request"
# sandbox_mode = "read-only"
# service_tier = "flex"
# oss_provider = "ollama"
# model_reasoning_effort = "medium"
# plan_mode_reasoning_effort = "high"
# model_reasoning_summary = "auto"
# model_verbosity = "medium"
# personality = "pragmatic" # or "friendly" or "none"
# chatgpt_base_url = "https://chatgpt.com/backend-api/"
# model_catalog_json = "./models.json"
# model_instructions_file = "/absolute/or/relative/path/to/instructions.txt"
# experimental_compact_prompt_file = "./compact_prompt.txt"
# tools_view_image = true
# features = { unified_exec = false }

[features]
js_repl = true
memories = true
prevent_idle_sleep = true

[memories]
generate_memories = true
use_memories = true
disable_on_external_context = false

[tui]
status_line = ["model-with-reasoning", "current-dir", "five-hour-limit", "weekly-limit", "fast-mode", "task-progress", "used-tokens"]

[analytics]
enabled = false

[agents]
# Maximum concurrently open agent threads. Default: 6
max_threads = 6
# Maximum nested spawn depth. Root session starts at depth 0. Default: 1
max_depth = 1
# Default timeout per worker for spawn_agents_on_csv jobs. When unset, the tool defaults to 1800 seconds.
job_max_runtime_seconds = 1800
