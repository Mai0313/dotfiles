#:schema https://developers.openai.com/codex/config-schema.json
# Example: https://developers.openai.com/codex/config-sample

model = "gpt-5.5"
personality = "pragmatic"
approval_policy = "untrusted"
model_reasoning_effort = "xhigh"
plan_mode_reasoning_effort = "xhigh"
model_reasoning_summary = "auto"
model_verbosity = "medium"
model_supports_reasoning_summaries = true
project_doc_fallback_filenames = ["CLAUDE.md", "GEMINI.md"]

approvals_reviewer = "guardian_subagent"
hide_agent_reasoning = false
show_raw_agent_reasoning = false
disable_paste_burst = false
windows_wsl_setup_acknowledged = false
check_for_update_on_startup = true
oss_provider = "oai"

[model_providers.oai]
name = "oai"
base_url = "https://api.mai0313.com"
env_key = "OPENAI_API_KEY"
wire_api = "responses"

[profiles.easy]
model = "azure/gpt-5.5"
model_provider = "oai"
personality = "pragmatic"
approval_policy = "untrusted"
model_reasoning_effort = "medium"
plan_mode_reasoning_effort = "medium"
model_reasoning_summary = "auto"
model_verbosity = "medium"

[profiles.hard]
model = "azure/gpt-5.5"
model_provider = "oai"
personality = "pragmatic"
approval_policy = "untrusted"
model_reasoning_effort = "xhigh"
plan_mode_reasoning_effort = "xhigh"
model_reasoning_summary = "auto"
model_verbosity = "medium"

[profiles.azure]
model = "azure/gpt-5.5"
model_provider = "oai"
personality = "pragmatic"
approval_policy = "untrusted"
model_reasoning_effort = "xhigh"
plan_mode_reasoning_effort = "xhigh"
model_reasoning_summary = "auto"
model_verbosity = "medium"

[features]
terminal_resize_reflow = true
js_repl = true
memories = true
prevent_idle_sleep = true
goals = true

[memories]
generate_memories = true
use_memories = true
disable_on_external_context = false

[analytics]
enabled = false

[agents]
# Maximum concurrently open agent threads. Default: 6
max_threads = 20
# Maximum nested spawn depth. Root session starts at depth 0. Default: 1
max_depth = 1
# Default timeout per worker for spawn_agents_on_csv jobs. When unset, the tool defaults to 1800 seconds.
job_max_runtime_seconds = 1800

[tui]
status_line = ["model-with-reasoning", "current-dir", "five-hour-limit", "fast-mode", "task-progress", "used-tokens", "run-state", "git-branch", "pull-request-number"]
status_line_use_colors = true
