#:schema https://developers.openai.com/codex/config-schema.json
# Example: https://developers.openai.com/codex/config-sample
# Profile Example: https://developers.openai.com/codex/config-advanced#profiles

model = "gpt-5.5"
review_model = "gpt-5.5"
personality = "pragmatic"
approval_policy = "never"
model_reasoning_effort = "xhigh"
plan_mode_reasoning_effort = "xhigh"
model_reasoning_summary = "auto"
model_context_window = 1050000
model_auto_compact_token_limit = 735000
model_verbosity = "medium"
model_provider = "oai"

[memories]
extract_model = "gpt-5.5"
consolidation_model = "gpt-5.5"

[model_providers.oai]
name = "oai"
base_url = "https://api.mai0313.com"
env_key = "OPENAI_API_KEY"
wire_api = "responses"
http_headers = { "x-litellm-end-user-id" = "codex" }
