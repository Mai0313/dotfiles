personality = "pragmatic"
model = "gpt-5.4"
model_reasoning_effort = "medium"

[tui]
status_line = ["model-with-reasoning", "current-dir", "five-hour-limit", "weekly-limit", "fast-mode", "task-progress"]

[plugins."github@openai-curated"]
enabled = true

[features]
memories = true
js_repl = true
external_migration = true
prevent_idle_sleep = true

[memories]
use_memories = true
generate_memories = true
